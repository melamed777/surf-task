replicaCount: 2

image:
  repository: ghcr.io/example/app
  tag: latest
  pullPolicy: IfNotPresent

service:
  port: 80
  targetPort: 8080

ingress:
  enabled: true
  className: nginx
  host: app.localtest.me
  path: /
  pathType: Prefix

env: []

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    cpu: 200m
    memory: 128Mi

probes:
  readiness:
    path: /healthz
    initialDelaySeconds: 1
    periodSeconds: 5
  liveness:
    path: /healthz
    initialDelaySeconds: 5
    periodSeconds: 10
