name: build-and-publish

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        app: [app1, app2]
    steps:
      - uses: actions/checkout@v4

      - name: Compute metadata
        id: meta
        run: |
          echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
          # github.sha is empty when running act against an uncommitted tree.
          # Fall back to a short timestamp so the tag is always valid.
          sha="${GITHUB_SHA:-}"
          if [ -z "$sha" ]; then sha="dev-$(date -u +%Y%m%d%H%M%S)"; fi
          echo "sha=${sha}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.app }}
        uses: docker/build-push-action@v6
        with:
          context: apps/${{ matrix.app }}
          # Multi-arch so the image runs on both Apple Silicon (arm64) and
          # x86 runners / clusters without emulation surprises.
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.owner }}/${{ matrix.app }}:latest
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.owner }}/${{ matrix.app }}:${{ steps.meta.outputs.sha }}

  publish-chart:
    runs-on: ubuntu-latest
    needs: build-images
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase owner
        id: meta
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - uses: azure/setup-helm@v4
        with:
          version: v3.15.2

      - name: Login Helm to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} \
            --username ${{ github.actor }} --password-stdin

      - name: Package chart
        run: helm package charts/generic-app --destination /tmp/charts

      - name: Push chart to GHCR (OCI)
        run: |
          helm push /tmp/charts/generic-app-*.tgz oci://${{ env.REGISTRY }}/${{ steps.meta.outputs.owner }}/charts

  bump-gitops-tag:
    # GitOps image promotion: after the images for HEAD are published, open
    # a PR that pins gitops/inhouse-apps.yaml to this commit's SHA. Merging
    # the PR is what triggers ArgoCD to roll the apps forward -- main is
    # never written to directly by CI.
    runs-on: ubuntu-latest
    needs: build-images
    if: github.event_name != 'pull_request'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Default token is fine for opening PRs against the same repo.
          fetch-depth: 0

      - name: Bump image tag in gitops/
        id: bump
        run: |
          sha="${GITHUB_SHA}"
          short="${sha:0:7}"
          # Replace the `tag: <anything>` line in the in-house values block.
          # The pattern is intentionally narrow so it only matches our line.
          sed -i -E "s|^(\s*tag:\s*).*$|\1${sha}|" gitops/inhouse-apps.yaml
          if git diff --quiet gitops/inhouse-apps.yaml; then
            echo "no_change=true" >> "$GITHUB_OUTPUT"
          else
            echo "no_change=false" >> "$GITHUB_OUTPUT"
            echo "short=${short}" >> "$GITHUB_OUTPUT"
            echo "sha=${sha}" >> "$GITHUB_OUTPUT"
          fi

      - name: Open PR
        if: steps.bump.outputs.no_change == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          branch="bot/bump-tag-${{ steps.bump.outputs.short }}"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add gitops/inhouse-apps.yaml
          git commit -m "chore(gitops): bump image tag to ${{ steps.bump.outputs.short }}"
          # Force-push so re-running on the same SHA doesn't fail.
          git push --force-with-lease origin "$branch"
          # Open a PR; if one already exists for this branch, succeed quietly.
          if ! gh pr create \
              --title "chore(gitops): bump image tag to ${{ steps.bump.outputs.short }}" \
              --body "Auto-generated by build-and-publish.yml after pushing images for ${{ steps.bump.outputs.sha }}. Merging this rolls app1/app2 forward via ArgoCD." \
              --base main \
              --head "$branch" 2>&1 | tee /tmp/pr.out; then
            grep -q "already exists" /tmp/pr.out
          fi
