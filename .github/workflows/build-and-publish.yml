name: build-and-publish

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        app: [app1, app2]
    steps:
      - uses: actions/checkout@v4

      - name: Compute metadata
        id: meta
        run: |
          echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
          # github.sha is empty when running act against an uncommitted tree.
          # Fall back to a short timestamp so the tag is always valid.
          sha="${GITHUB_SHA:-}"
          if [ -z "$sha" ]; then sha="dev-$(date -u +%Y%m%d%H%M%S)"; fi
          echo "sha=${sha}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.app }}
        uses: docker/build-push-action@v6
        with:
          context: apps/${{ matrix.app }}
          # Multi-arch so the image runs on both Apple Silicon (arm64) and
          # x86 runners / clusters without emulation surprises.
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.owner }}/${{ matrix.app }}:latest
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.owner }}/${{ matrix.app }}:${{ steps.meta.outputs.sha }}

  publish-chart:
    runs-on: ubuntu-latest
    needs: build-images
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase owner
        id: meta
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - uses: azure/setup-helm@v4
        with:
          version: v3.15.2

      - name: Login Helm to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} \
            --username ${{ github.actor }} --password-stdin

      - name: Package chart
        run: helm package charts/generic-app --destination /tmp/charts

      - name: Push chart to GHCR (OCI)
        run: |
          helm push /tmp/charts/generic-app-*.tgz oci://${{ env.REGISTRY }}/${{ steps.meta.outputs.owner }}/charts
