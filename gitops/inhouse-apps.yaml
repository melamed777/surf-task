apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: inhouse-apps
  namespace: argocd
spec:
  # The list generator produces one Application per element. Adding an app
  # is a two-line entry here, not a new file.
  generators:
    - list:
        elements:
          - name: app1
            host: app1.localtest.me
          - name: app2
            host: app2.localtest.me
  template:
    metadata:
      name: '{{name}}'
      namespace: argocd
    spec:
      project: default
      destination:
        server: https://kubernetes.default.svc
        namespace: apps
      source:
        # In-repo generic chart. To switch to the OCI-published chart, set:
        #   repoURL: ghcr.io/melamed777/charts
        #   chart: generic-app
        #   targetRevision: 0.1.0
        # and drop `path:`.
        repoURL: https://github.com/melamed777/surf-task
        targetRevision: main
        path: charts/generic-app
        helm:
          releaseName: '{{name}}'
          values: |
            image:
              repository: ghcr.io/melamed777/{{name}}
              tag: d44628a85e43a638096c06a6dce7c6a60da41f22
            ingress:
              enabled: true
              className: nginx
              host: {{host}}
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
